version: '3.8'

services:
  # Single Database container
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: tg-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=tradingguru
      - POSTGRES_USER=trader
      - POSTGRES_PASSWORD=tgpass
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"

  # Single Redis container
  redis:
    image: redis:7-alpine
    container_name: tg-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"

  # Combined NestJS Backend (API + Workers in one process)
  api:
    build: 
      context: ./apps/server
      dockerfile: Dockerfile
    container_name: tg-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://trader:tgpass@postgres:5432/tradingguru
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=YOUR_FREE_GEMINI_KEY
      - RUN_IN_COMBINED_MODE=true # Runs BullMQ workers inside the main process
      - PORT=4000
    depends_on:
      - postgres
      - redis
    ports:
      - "4000:4000"

  # Optimized Next.js Frontend
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: tg-frontend
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  pgdata:
